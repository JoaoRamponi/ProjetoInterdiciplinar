<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Funcionário</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="form-container">

    <div class="titulo-faixa">
        ACESSO LOGIN FUNCIONÁRIO
    </div>
    <form action="phps/cadastro_funcionario.php" method="POST">

        <div class="linha">
            <label>Nome completo:</label>
            <input type="text" name="nome_funcionario">
        </div>

        <div class="linha-dupla">
            <div>
                <label>RG:</label>
                <input type="text" name="rg_funcionario">

                <label>Data nascimento:</label>
                <input type="text" name="dataNasci_funcionario">
            </div>
        </div>

        <div class="linha-dupla">
            <div>
                <label>Cidade/bairro:</label>
                <input type="text" name="cidade_funcionario">
            </div>
        </div>

        <div class="linha-dupla">
            <div>
                <label>Telefone:</label>
                <input type="text" name="telefone_funcionario">
            </div>
            <div>
                <label>Email:</label>
                <input type="email" name="email_funcionario">
            </div>
        </div>

        <button class="botao-cadastrar">Cadastrar Passageiro </button>
        <button type="button" class="botao-cadastrar" onclick="window.location.href='pagamento.html'">Pagamento</button>
    </form>
</div>
    
</body>
</html>
