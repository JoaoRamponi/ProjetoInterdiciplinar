<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZSR Airlines - Só Ida</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="topo">
    <div class="logo">Z<span>·S·R</span></div>
    <nav>
      <a href="#">Descubra</a>
      <a href="#">Reservar</a>
      <a href="#">Viagens</a>
      <a href="#">PlatinumClub</a>
      <a href="#">Funcionários</a>
      <a href="#">Aeroportos</a>
      <a href="#">Ajuda</a>
      <a href="#">Acessar</a>
    </nav>
  </header>

  <section class="banner">
    
    <div class="formulario">
      <div class="abas">
        <a href="index.html">Ida e Volta</a>
        <a href="so-ida.html" class="ativa">Só Ida</a>
        <a href="multidestino.html">Multidestino</a>
      </div>

      <form>
        <div class="linha">
          <div class="campo">
            <label>Origem</label>
            <input type="text" placeholder="Insira sua cidade de origem">
          </div>
          <div class="campo">
            <label>Destino</label>
            <input type="text" placeholder="Insira sua cidade de destino">
          </div>
          <div class="campo pequeno">
            <label>Passagens / Classe</label>
            <select>
              <option>1 passageiro, Econômica</option>
              <option>2 passageiros, Econômica</option>
              <option>Executiva</option>
            </select>
          </div>
        </div>

        <div class="linha">
          <div class="campo">
            <label>Data da Ida</label>
            <input type="date">
          </div>
        </div>

        <div class="botoes">
          <button type="button" class="btn secundario">Mapa assentos</button>
          <button type="button" class="btn secundario">Pagamento</button>
          <button type="submit" class="btn buscar">Buscar</button>
          <button type="button" class="btn secundario">Mostrar voos</button>
        </div>
      </form>
    </div>
  </section>

</body>
</html>
